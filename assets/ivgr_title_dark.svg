  <!-- Title text: 'iVGR' bold accent blue, I/V/G/R highlighted, rest light for dark backgrounds -->
  <text x="76" y="60" font-family="'Google Sans', 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#e6e6e6" xml:space="preserve"><tspan font-weight="800" fill="#4f7be6">iVGR</tspan>: <tspan font-weight="700" fill="#4f7be6">I</tspan>nternalizing <tspan font-weight="700" fill="#4f7be6">V</tspan>isually <tspan font-weight="700" fill="#4f7be6">G</tspan>rounded <tspan font-weight="700" fill="#4f7be6">R</tspan>easoning</text>
  <text x="76" y="110" font-family="'Google Sans', 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#e6e6e6">for MLLMs with Reinforcement Learning</text>
</svg>
