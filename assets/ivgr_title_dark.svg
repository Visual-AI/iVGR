    <path d="M4 39V52H17" stroke="#4f7be6" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M39 52H52V39" stroke="#4f7be6" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M10 28 C 17 19, 39 19, 46 28 C 39 37, 17 37, 10 28 Z" stroke="#4f7be6" stroke-width="2.8" stroke-linejoin="round" fill="none"/>
