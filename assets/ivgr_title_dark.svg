<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 130" preserveAspectRatio="xMidYMid meet" role="img" aria-label="iVGR: Internalizing Visually Grounded Reasoning for MLLMs with Reinforcement Learning">
  <!-- Logo: viewfinder + eye (matches project page) -->
  <g transform="translate(0, 30)">
    <path d="M4 17V4H17" stroke="#4f7be6" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
