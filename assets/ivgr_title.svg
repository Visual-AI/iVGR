  <text x="76" y="110" font-family="'Google Sans', 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#1a1a1a">for MLLMs with Reinforcement Learning</text>
